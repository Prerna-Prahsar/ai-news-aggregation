<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI News Dashboard — Architecture</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; margin: 0; padding: 32px; }
  h1 { font-size: 20px; color: #38bdf8; margin-bottom: 4px; }
  p  { font-size: 13px; color: #94a3b8; margin-bottom: 32px; }
  svg text { font-family: system-ui, sans-serif; }
</style>
</head>
<body>
<h1>AI News Dashboard — Architecture Diagram</h1>
<p>Full-stack MVP · FastAPI · PostgreSQL · React · Docker</p>

<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:860px">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">

    </marker>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="840" height="500" rx="12" fill="#1e293b" stroke="#334155"/>

  <!-- INGESTION LAYER -->
  <rect x="30" y="40" width="180" height="260" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="120" y="63" text-anchor="middle" font-size="11" fill="#60a5fa" font-weight="600">INGESTION LAYER</text>

  <rect x="45" y="75" width="150" height="30" rx="5" fill="#1e40af"/>
  <text x="120" y="95" text-anchor="middle" font-size="10" fill="#bfdbfe">20+ RSS Feeds</text>

  <rect x="45" y="115" width="150" height="30" rx="5" fill="#1e40af"/>

  <rect x="45" y="155" width="150" height="30" rx="5" fill="#1e40af"/>
  <text x="120" y="175" text-anchor="middle" font-size="10" fill="#bfdbfe">arXiv RSS</text>

  <text x="120" y="280" text-anchor="middle" font-size="9" fill="#7dd3fc">Async concurrent fetch</text>

  <line x1="210" y1="165" x2="255" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="255" y="40" width="190" height="260" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="350" y="109" text-anchor="middle" font-size="9" fill="#c4b5fd">TF-IDF Cosine Similarity</text>

  <rect x="270" y="130" width="160" height="44" rx="5" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
  <text x="350" y="149" text-anchor="middle" font-size="10" fill="#c4b5fd" font-weight="600">Normalizer</text>
  <text x="350" y="164" text-anchor="middle" font-size="9" fill="#c4b5fd">Clean HTML, extract tags</text>

  <rect x="270" y="185" width="160" height="44" rx="5" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>

  <text x="350" y="279" text-anchor="middle" font-size="9" fill="#a5b4fc">Every 15 minutes</text>

  <rect x="505" y="146" width="150" height="24" rx="4" fill="#022c22"/>
  <text x="580" y="162" text-anchor="middle" font-size="9" fill="#86efac">news_items</text>

  <rect x="505" y="176" width="150" height="24" rx="4" fill="#022c22"/>
  <text x="580" y="192" text-anchor="middle" font-size="9" fill="#86efac">favorites</text>

  <rect x="505" y="206" width="150" height="24" rx="4" fill="#022c22"/>
  <text x="580" y="222" text-anchor="middle" font-size="9" fill="#86efac">broadcast_logs</text>

  <rect x="505" y="236" width="150" height="24" rx="4" fill="#022c22"/>
  <text x="580" y="252" text-anchor="middle" font-size="9" fill="#86efac">users</text>

  <text x="580" y="286" text-anchor="middle" font-size="9" fill="#86efac">SQLAlchemy · Alembic</text>

  <!-- Arrow DB → Backend -->
  <line x1="670" y1="165" x2="715" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="775" y="147" text-anchor="middle" font-size="9" fill="#fde68a">/broadcast /admin</text>

  <!-- Arrow Backend → Frontend -->

  <text x="775" y="281" text-anchor="middle" font-size="9" fill="#67e8f9">Tailwind + Recharts</text>

  <text x="287" y="418" text-anchor="middle" font-size="9" fill="#38bdf8">Simulated</text>
  <text x="287" y="434" text-anchor="middle" font-size="9" fill="#7dd3fc">AI caption gen</text>
  <text x="287" y="450" text-anchor="middle" font-size="9" fill="#7dd3fc">#hashtag support</text>

  <rect x="380" y="365" width="145" height="100" rx="6" fill="#052015" stroke="#16a34a"/>

  <text x="452" y="402" text-anchor="middle" font-size="9" fill="#86efac">Twilio / Meta API</text>
  <text x="452" y="418" text-anchor="middle" font-size="9" fill="#4ade80">Simulated</text>
  <text x="452" y="434" text-anchor="middle" font-size="9" fill="#86efac">Group sharing</text>
  <text x="452" y="450" text-anchor="middle" font-size="9" fill="#86efac">Message preview</text>

  <rect x="545" y="365" width="145" height="100" rx="6" fill="#1a0a2e" stroke="#7c3aed"/>

  <text x="617" y="402" text-anchor="middle" font-size="9" fill="#c4b5fd">WordPress / Ghost</text>
  <text x="617" y="418" text-anchor="middle" font-size="9" fill="#a78bfa">Simulated</text>
  <text x="617" y="434" text-anchor="middle" font-size="9" fill="#c4b5fd">Draft creation</text>
  <text x="617" y="450" text-anchor="middle" font-size="9" fill="#c4b5fd">CMS integration</text>

  <text x="772" y="450" text-anchor="middle" font-size="9" fill="#fdba74">Batch sends</text>

  <!-- Broadcast arrow from Frontend -->
  <line x1="775" y1="300" x2="440" y2="330" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
